<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amrit's Hacker Login</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            color: #00ff00;
            padding-bottom: 80px;
        }

        /* Matrix background animation */
        .matrix-bg {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
            opacity: 0.05;
        }

        .matrix-char {
            position: absolute;
            color: #00ff00;
            font-size: 14px;
            font-weight: bold;
            animation: matrix-fall linear infinite;
            text-shadow: 0 0 10px #00ff00;
        }

        @keyframes matrix-fall {
            0% {
                top: -10px;
                opacity: 1;
            }
            100% {
                top: 100vh;
                opacity: 0;
            }
        }

        /* Scanlines effect */
        .scanlines {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 255, 0, 0.03),
                rgba(0, 255, 0, 0.03) 2px,
                transparent 2px,
                transparent 4px
            );
            animation: flicker 0.15s infinite;
            z-index: 1;
        }

        @keyframes flicker {
            0% { opacity: 0.97; }
            50% { opacity: 1; }
            100% { opacity: 0.97; }
        }

        /* Login Section */
        .login-section {
            background: #000;
            border: 2px solid #00ff00;
            border-radius: 10px;
            padding: 60px 50px;
            width: 100%;
            max-width: 450px;
            position: relative;
            z-index: 2;
            box-shadow: 
                0 0 10px #00ff00,
                0 0 20px rgba(0, 255, 0, 0.3),
                inset 0 0 20px rgba(0, 255, 0, 0.1);
            animation: glitch-border 0.5s infinite alternate;
        }

        /* Documents Section */
        .documents-section {
            display: none;
            background: rgba(10, 14, 39, 0.95);
            border: 2px solid #00ff00;
            border-radius: 10px;
            padding: 40px;
            width: 100%;
            max-width: 800px;
            position: relative;
            z-index: 2;
            box-shadow: 
                0 0 10px #00ff00,
                0 0 20px rgba(0, 255, 0, 0.3),
                inset 0 0 20px rgba(0, 255, 0, 0.1);
            animation: slideUp 0.8s ease-out;
            max-height: 75vh;
            overflow-y: auto;
        }

        .documents-section.show {
            display: block;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes glitch-border {
            0% {
                box-shadow: 
                    0 0 10px #00ff00,
                    0 0 20px rgba(0, 255, 0, 0.3),
                    inset 0 0 20px rgba(0, 255, 0, 0.1);
            }
            100% {
                box-shadow: 
                    0 0 15px #00ff00,
                    0 0 30px rgba(0, 255, 0, 0.5),
                    inset 0 0 20px rgba(0, 255, 0, 0.2);
            }
        }

        /* Corners decoration */
        .corner {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid #00ff00;
        }

        .corner.top-left {
            top: -2px;
            left: -2px;
            border-right: none;
            border-bottom: none;
        }

        .corner.top-right {
            top: -2px;
            right: -2px;
            border-left: none;
            border-bottom: none;
        }

        .corner.bottom-left {
            bottom: -2px;
            left: -2px;
            border-right: none;
            border-top: none;
        }

        .corner.bottom-right {
            bottom: -2px;
            right: -2px;
            border-left: none;
            border-top: none;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: type-out 2s steps(20, end);
        }

        @keyframes type-out {
            from {
                width: 0;
                overflow: hidden;
            }
            to {
                width: 100%;
            }
        }

        .header h1 {
            font-size: 28px;
            color: #00ff00;
            text-shadow: 0 0 20px #00ff00, 0 0 40px rgba(0, 255, 0, 0.5);
            margin-bottom: 1px;
            letter-spacing: 4px;
            font-weight: bold;
        }

        /* Welcome overlay */
        .welcome-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 5;
            animation: fadeIn 1s forwards;
        }

        .welcome-overlay.show {
            display: flex;
        }

        .welcome-text {
            font-size: 32px;
            color: #00ff00;
            text-shadow: 0 0 30px #00ff00, 0 0 60px rgba(0,255,0,0.4);
            animation: zoomIn 1s ease-out;
            letter-spacing: 2px;
        }

        @keyframes zoomIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .header h1::before {
            content: '</>';
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }

        .status {
            color: #00cc00;
            font-size: 12px;
            letter-spacing: 1px;
            animation: flicker-text 2s infinite;
        }

        @keyframes flicker-text {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
                text-shadow: 0 0 10px #00ff00;
                color: #00ff00;
            }
            20%, 24%, 55% {
                text-shadow: none;
                color: #00aa00;
            }
        }

        .form-group {
            margin-bottom: 25px;
            animation: slide-in 0.5s ease-out backwards;
        }

        .form-group:nth-child(1) { animation-delay: 0.3s; }
        .form-group:nth-child(2) { animation-delay: 0.5s; }

        @keyframes slide-in {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #00ff00;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: bold;
        }

        label::before {
            content: '[ ';
            color: #00aa00;
        }

        label::after {
            content: ' ]';
            color: #00aa00;
        }

        input {
            width: 100%;
            padding: 12px;
            background: rgba(0, 30, 0, 0.8);
            border: 1px solid #00ff00;
            border-radius: 3px;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            transition: all 0.3s ease;
            box-shadow: inset 0 0 5px rgba(0, 255, 0, 0.1);
        }

        input:focus {
            outline: none;
            border-color: #00ffff;
            background: rgba(0, 50, 0, 0.9);
            box-shadow: 
                inset 0 0 5px rgba(0, 255, 0, 0.2),
                0 0 10px rgba(0, 255, 0, 0.5),
                0 0 20px rgba(0, 255, 0, 0.3);
            color: #00ffff;
        }

        input::placeholder {
            color: #007700;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, rgba(0, 255, 0, 0.2), rgba(0, 255, 100, 0.1));
            color: #00ff00;
            border: 2px solid #00ff00;
            border-radius: 3px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            animation: slide-in 0.5s ease-out 0.7s backwards;
            position: relative;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            margin-top: 20px;
        }

        .login-btn::before {
            content: '[ ';
            margin-right: 10px;
        }

        .login-btn::after {
            content: ' ]';
            margin-left: 10px;
        }

        .login-btn:hover {
            background: linear-gradient(135deg, rgba(0, 255, 0, 0.4), rgba(0, 255, 100, 0.3));
            box-shadow: 
                0 0 10px #00ff00,
                0 0 20px rgba(0, 255, 0, 0.5),
                inset 0 0 10px rgba(0, 255, 0, 0.2);
            transform: translateY(-2px);
            color: #00ffff;
            border-color: #00ffff;
        }

        .login-btn:active {
            transform: translateY(0);
            box-shadow: 
                0 0 5px #00ff00,
                inset 0 0 10px rgba(0, 255, 0, 0.3);
        }

        .error-msg {
            color: #ff0000;
            font-size: 12px;
            margin-top: 10px;
            text-align: center;
            text-shadow: 0 0 10px #ff0000;
            display: none;
            animation: shake 0.5s;
        }

        .error-msg.show {
            display: block;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* Documents styles */
        .doc-header {
            color: #00ff00;
            font-size: 24px;
            margin-bottom: 30px;
            text-shadow: 0 0 20px #00ff00;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .doc-header::before {
            content: '> ';
        }

        .document {
            background: rgba(0, 30, 0, 0.7);
            border-left: 3px solid #00ff00;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            animation: fadeInDoc 0.6s ease-out backwards;
        }

        .document:nth-child(1) { animation-delay: 0.2s; }
        .document:nth-child(2) { animation-delay: 0.4s; }
        .document:nth-child(3) { animation-delay: 0.6s; }
        .document:nth-child(4) { animation-delay: 0.8s; }
        .document:nth-child(5) { animation-delay: 1s; }
        .document:nth-child(6) { animation-delay: 1.2s; }

        @keyframes fadeInDoc {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .document:hover {
            background: rgba(0, 60, 0, 0.8);
            border-left-color: #00ffff;
            box-shadow: 
                0 0 10px #00ff00,
                inset 0 0 10px rgba(0, 255, 0, 0.1);
            transform: translateX(10px);
        }

        .doc-name {
            color: #00ff00;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .doc-name::before {
            content: '[FILE] ';
            color: #00aa00;
        }

        .doc-desc {
            color: #00cc00;
            font-size: 12px;
            margin-left: 0;
        }

        .doc-desc::before {
            content: '> ';
        }

        .logout-btn {
            width: 100%;
            padding: 12px;
            background: rgba(255, 0, 0, 0.2);
            color: #ff0000;
            border: 2px solid #ff0000;
            border-radius: 3px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-family: 'Courier New', monospace;
            transition: all 0.3s ease;
            margin-top: 30px;
        }

        .logout-btn:hover {
            background: rgba(255, 0, 0, 0.4);
            box-shadow: 0 0 10px #ff0000;
        }

        /* Footer */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            text-align: center;
            padding: 15px;
            background: rgba(10, 14, 39, 0.9);
            color: #00ff00;
            font-size: 12px;
            letter-spacing: 1px;
            border-top: 1px solid #00ff00;
            z-index: 3;
            box-shadow: 0 -5px 15px rgba(0, 255, 0, 0.2);
        }

        .footer::before {
            content: '>> ';
        }

        /* Scrollbar styling */
        .documents-section::-webkit-scrollbar {
            width: 8px;
        }

        .documents-section::-webkit-scrollbar-track {
            background: rgba(0, 20, 0, 0.5);
        }

        .documents-section::-webkit-scrollbar-thumb {
            background: #00ff00;
            border-radius: 4px;
        }

        .documents-section::-webkit-scrollbar-thumb:hover {
            background: #00ffff;
        }

        /* ===== RESPONSIVE DESIGN ===== */

        /* Tablets (768px and below) */
        @media (max-width: 768px) {
            body {
                padding-bottom: 90px;
                padding: 20px 15px;
                padding-bottom: 90px;
            }

            .login-section {
                padding: 40px 30px;
                max-width: 100%;
            }

            .documents-section {
                padding: 30px 20px;
                max-width: 100%;
                max-height: 70vh;
            }

            .header h1 {
                font-size: 22px;
                letter-spacing: 2px;
            }

            .status {
                font-size: 11px;
            }

            label {
                font-size: 11px;
                letter-spacing: 1px;
            }

            input {
                padding: 10px 12px;
                font-size: 13px;
            }

            .login-btn {
                padding: 12px;
                font-size: 13px;
            }

            .logout-btn {
                padding: 10px;
                font-size: 11px;
            }

            .doc-header {
                font-size: 20px;
                margin-bottom: 20px;
            }

            .document {
                padding: 15px;
                margin-bottom: 10px;
            }

            .doc-name {
                font-size: 13px;
            }

            .doc-desc {
                font-size: 11px;
            }

            .welcome-text {
                font-size: 24px;
            }

            .footer {
                padding: 12px;
                font-size: 11px;
            }
        }

        /* Mobile phones (480px and below) */
        @media (max-width: 480px) {
            body {
                padding: 10px;
                padding-bottom: 85px;
                justify-content: flex-start;
                align-items: flex-start;
                min-height: auto;
                padding-top: 20px;
            }

            .login-section {
                padding: 30px 20px;
                max-width: 100%;
                margin: 0 auto;
            }

            .documents-section {
                padding: 20px 15px;
                max-width: 100%;
                max-height: 65vh;
                margin: 0 auto;
            }

            .corner {
                width: 15px;
                height: 15px;
            }

            .header {
                margin-bottom: 25px;
            }

            .header h1 {
                font-size: 18px;
                letter-spacing: 1px;
                margin-bottom: 3px;
            }

            .status {
                font-size: 10px;
                letter-spacing: 0.5px;
            }

            .form-group {
                margin-bottom: 18px;
            }

            label {
                font-size: 10px;
                letter-spacing: 0.5px;
                margin-bottom: 6px;
            }

            input {
                padding: 9px 10px;
                font-size: 12px;
                border-radius: 3px;
            }

            .login-btn {
                padding: 10px;
                font-size: 12px;
                margin-top: 15px;
            }

            .login-btn::before {
                content: '';
                margin-right: 0;
            }

            .login-btn::after {
                content: '';
                margin-left: 0;
            }

            .error-msg {
                font-size: 11px;
                margin-top: 8px;
            }

            .doc-header {
                font-size: 18px;
                margin-bottom: 15px;
            }

            .doc-header::before {
                content: '';
            }

            .document {
                padding: 12px;
                margin-bottom: 8px;
                border-left-width: 2px;
            }

            .doc-name {
                font-size: 12px;
                margin-bottom: 4px;
            }

            .doc-name::before {
                content: '';
            }

            .doc-desc {
                font-size: 10px;
            }

            .doc-desc::before {
                content: '';
            }

            .logout-btn {
                padding: 9px;
                font-size: 10px;
                margin-top: 20px;
            }

            .welcome-text {
                font-size: 18px;
                letter-spacing: 1px;
            }

            .footer {
                padding: 10px;
                font-size: 10px;
                letter-spacing: 0px;
            }

            .footer::before {
                content: '';
            }
        }

        /* Extra small phones (320px) */
        @media (max-width: 360px) {
            .login-section {
                padding: 25px 15px;
                border-radius: 5px;
            }

            .documents-section {
                padding: 15px 12px;
                border-radius: 5px;
            }

            .header h1 {
                font-size: 16px;
                letter-spacing: 0.5px;
            }

            .status {
                font-size: 9px;
            }

            label {
                font-size: 9px;
            }

            input {
                padding: 8px;
                font-size: 11px;
            }

            .login-btn {
                padding: 9px;
                font-size: 11px;
            }

            .doc-header {
                font-size: 16px;
            }

            .document {
                padding: 10px;
                margin-bottom: 6px;
            }

            .doc-name {
                font-size: 11px;
            }

            .doc-desc {
                font-size: 9px;
            }

            .welcome-text {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- Matrix background -->
    <div class="matrix-bg" id="matrixBg"></div>

    <!-- Scanlines overlay -->
    <div class="scanlines"></div>

    <!-- Login Section -->
    <div class="login-section" id="loginSection">
        <!-- Corner decorations -->
        <div class="corner top-left"></div>
        <div class="corner top-right"></div>
        <div class="corner bottom-left"></div>
        <div class="corner bottom-right"></div>

        <!-- Header -->
        <div class="header">
            <h1>WELCOME</h1>
            <div class="status">ONLY_AUTHORIZED_ACCESS</div>
        </div>

        <!-- Login form -->
        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username">Username</label>
                <input 
                    type="text" 
                    id="username" 
                    placeholder="Enter username"
                    required
                >
            </div>

            <button type="submit" class="login-btn">Enter</button>
            <div class="error-msg" id="errorMsg"></div>
        </form>
    </div>

    <!-- Welcome Overlay -->
    <div class="welcome-overlay" id="welcomeOverlay">
        <div class="welcome-text" id="welcomeText">WELCOME TO AMRIT WEBSITE</div>
    </div>

    <!-- Documents Section -->
    <div class="documents-section" id="documentsSection">
        <!-- Corner decorations -->
        <div class="corner top-left"></div>
        <div class="corner top-right"></div>
        <div class="corner bottom-left"></div>
        <div class="corner bottom-right"></div>

        <div class="doc-header">AMRIT'S DOCUMENTS</div>

        <div id="documentsList"></div>

        <button class="logout-btn" onclick="handleLogout()">LOGOUT_SYSTEM</button>
    </div>

    <!-- Footer -->
    <div class="footer">THIS WEBSITE CREATED BY AMRIT</div>

    <script>
        // Sample documents
        const documents = [
            {
                name: 'bill document make',
                desc: 'bassic details of demo world',
                url: 'DEMO WOLD.pdf'
            },
            {
                name: 'shadi ka chumawan',
                desc: 'bassic details of shadi',
                url: 'shadi ka chumawan.pdf'
            }
        ];

        // Generate matrix background characters
        function generateMatrixBg() {
            const bg = document.getElementById('matrixBg');
            const chars = '01アウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン';
            
            for (let i = 0; i < 15; i++) {
                const char = document.createElement('div');
                char.className = 'matrix-char';
                char.textContent = chars[Math.floor(Math.random() * chars.length)];
                char.style.left = Math.random() * 100 + '%';
                char.style.animationDuration = (Math.random() * 10 + 8) + 's';
                char.style.animationDelay = Math.random() * 2 + 's';
                bg.appendChild(char);
            }
        }

        let loginCompleted = false;

        // Show documents after welcome animation
        function showDocumentsAfterWelcome() {
            if (loginCompleted) return;
            loginCompleted = true;

            const overlay = document.getElementById('welcomeOverlay');
            overlay.classList.add('show');

            setTimeout(() => {
                overlay.classList.remove('show');
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('documentsSection').classList.add('show');
                populateDocuments();
            }, 2000);
        }

        // Handle login
        function handleLogin(event) {
            event.preventDefault();
            const username = document.getElementById('username').value;
            const errorMsg = document.getElementById('errorMsg');

            if (username.toLowerCase() === 'amrit') {
                const btn = event.target.querySelector('.login-btn');
                btn.textContent = 'AUTHENTICATING...';
                btn.style.pointerEvents = 'none';
                errorMsg.classList.remove('show');

                setTimeout(() => {
                    showDocumentsAfterWelcome();
                }, 500); // quicker after submit
            } else {
                errorMsg.textContent = '>> ERROR: INVALID CREDENTIALS - ACCESS DENIED!';
                errorMsg.classList.add('show');

                setTimeout(() => {
                    errorMsg.classList.remove('show');
                }, 3000);
            }
        }

        // Populate documents
        function populateDocuments() {
            const docsList = document.getElementById('documentsList');
            docsList.innerHTML = '';

            documents.forEach((doc, index) => {
                const docElement = document.createElement('div');
                docElement.className = 'document';
                if (doc.url) {
                    docElement.style.cursor = 'pointer';
                    docElement.addEventListener('click', () => {
                        window.open(doc.url, '_blank');
                    });
                }
                docElement.innerHTML = `
                    <div class="doc-name">${doc.name}</div>
                    <div class="doc-desc">${doc.desc}</div>
                `;
                docsList.appendChild(docElement);
            });
        }

        // Handle logout
        function handleLogout() {
            document.getElementById('documentsSection').classList.remove('show');
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('username').value = '';
            const btn = document.querySelector('.login-btn');
            btn.textContent = 'AUTHENTICATE';
            btn.style.pointerEvents = 'auto';
        }

        // Initialize
        generateMatrixBg();

        // trigger login as soon as username "Amrit" is typed
        const userInput = document.getElementById('username');
        userInput.addEventListener('input', () => {
            if (userInput.value.toLowerCase() === 'amrit') {
                showDocumentsAfterWelcome();
            }
        });

        // Add random glitch effect on header
        const header = document.querySelector('.header h1');
        setInterval(() => {
            if (Math.random() > 0.95) {
                header.style.textShadow = 'none';
                header.style.color = '#ff0000';
                setTimeout(() => {
                    header.style.textShadow = '0 0 20px #00ff00, 0 0 40px rgba(0, 255, 0, 0.5)';
                    header.style.color = '#00ff00';
                }, 100);
            }
        }, 2000);
    </script>
